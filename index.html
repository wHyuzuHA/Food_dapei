body{

}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.header{
text-align:center;
padding:30px 0;
}

.logo{
font-size:80px;

}

@keyframes float{
50%{transform:translateY(-10px)}
}

.title{
font-size:48px;
font-weight:900;
background:linear-gradient(90deg,#ff7fa8,#79ca7d);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.subtitle{
margin-top:10px;
opacity:.7;
}

.card{
background:rgba(255,255,255,.75);
backdrop-filter:blur(12px);
padding:28px;
border-radius:34px;
box-shadow:0 10px 40px rgba(0,0,0,.08);
margin-top:20px;
}

.section-title{
font-size:28px;
font-weight:800;
margin-bottom:20px;
}

.category{
margin-top:28px;
}

.category-title{
font-size:22px;
font-weight:700;
margin-bottom:14px;
}

.food-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
gap:14px;
}

.food{
background:white;
border-radius:24px;
padding:14px;
text-align:center;
cursor:pointer;
transition:.25s;
}

.food:hover{
transform:translateY(-5px);
}

.food.active{
background:linear-gradient(135deg,#7fd485,#98ea9d);
color:white;
}

.food-emoji{
font-size:42px;
}

.food-name{
font-size:14px;
font-weight:700;
margin-top:8px;
}

.weight{
width:100%;
margin-top:10px;
}

.methods,.tools{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:14px;
}

.method,.tool{
background:white;
border-radius:24px;
padding:20px;
text-align:center;
cursor:pointer;
transition:.25s;
}

.method.active,.tool.active{
background:linear-gradient(135deg,#ff89af,#ffb1c8);
color:white;
}

.big{
font-size:40px;
margin-bottom:10px;
}

button{
border:none;
cursor:pointer;
transition:.25s;
}

.buttons{
display:flex;
gap:14px;
margin-top:30px;
}

.random,.create{
flex:1;
padding:18px;
border-radius:22px;
font-size:16px;
font-weight:700;
color:white;
}

.random{
background:linear-gradient(135deg,#79ca7d,#9ce8a0);
}

.create{
background:linear-gradient(135deg,#ff7ea8,#ff9cbe);
}

.result-page{
display:none;
position:fixed;
inset:0;
background:linear-gradient(135deg,#fff7f1,#fff0f8);
overflow-y:auto;
padding:30px;
z-index:100;
}

.result-card{
max-width:760px;
margin:auto;
background:white;
border-radius:36px;
padding:36px;
box-shadow:0 10px 40px rgba(0,0,0,.1);
animation:pop .5s ease;
}

@keyframes pop{
from{opacity:0;transform:scale(.85)}
to{opacity:1;transform:scale(1)}
}

.result-emoji{
font-size:120px;
text-align:center;
}

.result-name{
font-size:42px;
font-weight:900;
text-align:center;
margin-top:12px;
}

.tags{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
}

.tag{
padding:10px 16px;
background:#f5f5f5;
border-radius:999px;
font-size:13px;
font-weight:700;
}

.box{
margin-top:22px;
background:#fafafa;
padding:22px;
border-radius:24px;
}

.box li{
margin:10px 0;
line-height:1.7;
}

.close-btn{
width:100%;
margin-top:24px;
padding:18px;
border-radius:22px;
background:linear-gradient(135deg,#ff7ea8,#ff9cbe);
color:white;
font-size:16px;
font-weight:700;
}

.loading-page{
display:none;
position:fixed;
inset:0;
background:rgba(255,255,255,.92);
backdrop-filter:blur(10px);
z-index:200;
align-items:center;
justify-content:center;
flex-direction:column;
}

.loading-page.show{
display:flex;
}

.loading-emoji{
font-size:100px;
animation:spin 2s linear infinite;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

.loading-text{
margin-top:20px;
font-size:20px;
font-weight:700;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
50%{opacity:.4}
}

.hidden{
display:none;
}

@media(max-width:700px){
.food-grid{
grid-template-columns:repeat(2,1fr);
}
}
</style>

wrap.innerHTML = `
<div class="category-title">${category}</div>

<div class="food-grid">

${categories[category].map(food=>`

<div class="food-emoji">${food.emoji}</div>

<div class="food-name">${food.name}</div>

slider.oninput = ()=>{
slider.nextElementSibling.querySelector("span").innerText = slider.value;
};
});

function toggleFood(el,name,emoji){

el.classList.toggle("active");

const weight = el.querySelector(".weight").value;

const exists = selectedFoods.find(v=>v.name===name);

if(exists){
selectedFoods.splice(selectedFoods.indexOf(exists),1);
renderMethods();
}else{
selectedFoods.push({name,emoji,weight});
renderMethods();
}
}

const methodContainer = document.getElementById("methodContainer");

function renderMethods(){

methodContainer.innerHTML = "";

const hasStaple = selectedFoods.some(v=>
["🍚","🍜","🍝","🍞","🍕","🥢"].includes(v.emoji)
);

methods.filter(m=>{
if(hasStaple){
return m.types.includes("staple");
}
return m.types.includes("dish");
}).forEach(m=>{

const div = document.createElement("div");

div.className = "method";

div.innerHTML = `
<div class="big">${m.emoji}</div>
<div>${m.name}</div>
`;

div.onclick = ()=>{

document.querySelectorAll(".method").forEach(v=>v.classList.remove("active"));

div.classList.add("active");

selectedMethod = m.name;

renderTools(m.name);

};

methodContainer.appendChild(div);

});
}

renderMethods();

function renderTools(method){

selectedTool = "";

document.getElementById("toolSection").classList.remove("hidden");

const toolContainer = document.getElementById("toolContainer");

toolContainer.innerHTML = "";

methodTools[method].forEach(tool=>{

const div = document.createElement("div");

div.className = "tool";

div.innerHTML = `
<div class="big">${tool.emoji}</div>
<div>${tool.name}</div>
`;

div.onclick = ()=>{

document.querySelectorAll(".tool").forEach(v=>v.classList.remove("active"));

div.classList.add("active");

selectedTool = tool.name;

};

toolContainer.appendChild(div);

});
}

function randomSelect(){

selectedFoods.length = 0;
selectedMethod = "";
selectedTool = "";

document.getElementById("toolSection").classList.add("hidden");

document.querySelectorAll(".food").forEach(v=>{
v.classList.remove("active");
});

document.querySelectorAll(".method").forEach(v=>{
v.classList.remove("active");
});

document.querySelectorAll(".tool").forEach(v=>{
v.classList.remove("active");
});

const allFoods = [];

Object.values(categories).forEach(arr=>{
arr.forEach(v=>allFoods.push(v));
});

allFoods
.sort(()=>Math.random()-0.5)
.slice(0,Math.floor(Math.random()*4)+3)
.forEach(food=>{

document.querySelectorAll(".food").forEach(card=>{

if(card.innerText.includes(food.name)){

const randomWeight = Math.floor(Math.random()*900)+100;

card.classList.add("active");

card.querySelector(".weight").value = randomWeight;

card.querySelector(".weight").nextElementSibling.querySelector("span").innerText = randomWeight;

selectedFoods.push({
name:food.name,
emoji:food.emoji,
weight:randomWeight
});

}

});

});

renderMethods();

const availableMethods = [...document.querySelectorAll(".method")];

if(availableMethods.length>0){

const randomMethod =
availableMethods[Math.floor(Math.random()*availableMethods.length)];

randomMethod.click();

setTimeout(()=>{

const availableTools = [...document.querySelectorAll(".tool")];

if(availableTools.length>0){

availableTools[
Math.floor(Math.random()*availableTools.length)
].click();

}

},100);

}

}

function createRecipe(){

if(selectedFoods.length===0){
alert("请先选择食材");

alert("请选择烹饪方式");

alert("请选择烹饪工具");

loadingPage.classList.add("show");

let i = 0;

const interval = setInterval(()=>{
document.getElementById("loadingText").innerText =
loadingTexts[i % loadingTexts.length];
i++;
},700);

setTimeout(()=>{

clearInterval(interval);

loadingPage.classList.remove("show");

showResult();

},3500);

}

function showResult(){

document.getElementById("resultPage").style.display = "block";

document.getElementById("resultEmoji").innerText =
resultEmojis[Math.floor(Math.random()*resultEmojis.length)];

const selectedStaple = selectedFoods.find(v=>
["🍚","🍜","🍝","🍞","🍕","🥢"].includes(v.emoji)
);

let finalRecipeName = "";

const totalWeight = selectedFoods.reduce((sum,v)=>sum+parseInt(v.weight),0);

const foodNames = selectedFoods.map(v=>v.name);

const matchedRecipe = smartRecipes.find(recipe=>
recipe.keywords.every(k=>foodNames.includes(k))
);

if(matchedRecipe){
if(totalWeight >= 1200){
finalRecipeName = matchedRecipe.heavy;
}else{
finalRecipeName = matchedRecipe.light;
}
}else if(selectedStaple){

if(totalWeight >= 1200){
finalRecipeName = "豪华版" + stapleRecipes[selectedStaple.emoji];
}else if(totalWeight <= 500){
finalRecipeName = "轻食版" + stapleRecipes[selectedStaple.emoji];
}else{
finalRecipeName = stapleRecipes[selectedStaple.emoji];
}

}else{

if(totalWeight >= 1400){
finalRecipeName = "巨无霸" + dishRecipes[Math.floor(Math.random()*dishRecipes.length)];
}else if(totalWeight <= 600){
finalRecipeName = "轻享" + dishRecipes[Math.floor(Math.random()*dishRecipes.length)];
}else{
finalRecipeName = dishRecipes[Math.floor(Math.random()*dishRecipes.length)];
}

}

document.getElementById("resultName").innerText = finalRecipeName;

document.getElementById("tags").innerHTML = `
<div class="tag">${selectedMethod}</div>
<div class="tag">${selectedTool}</div>
<div class="tag">AI推荐</div>
<div class="tag">高颜值</div>
`;

document.getElementById("ingredients").innerHTML =
selectedFoods.map(v=>`
<div style="margin:10px 0">
${v.emoji} ${v.name} · ${v.weight}g
</div>
`).join("");

const steps = [
"1. 将所有食材彻底清洗，并按照不同食材切块、去骨或改刀备用。",
`2. 使用 ${selectedTool} 进行充分预热，并提前准备基础调味料。`,
`3. 采用 ${selectedMethod} 技法处理主食材，先锁住香气与水分。`,
"4. 分阶段加入辅料与调味，让整体层次更加丰富。",
"5. 根据火候变化不断翻动或慢炖，避免口感失衡。",
"6. 最后加入 AI 推荐秘制酱汁进行提鲜。",
"7. 完成摆盘后可撒上点缀香料提升视觉效果。"
];

document.getElementById("steps").innerHTML =
steps.map(v=>`<li>${v}</li>`).join("");

const recipeDifficulty = "⭐".repeat(Math.floor(Math.random()*3)+2);
const recipeTime = `${10+Math.floor(Math.random()*40)} 分钟`;

document.getElementById("comment").innerHTML = `
<h3>🤖 AI 美食点评</h3>

<div style="margin-top:12px;line-height:1.8">
${comments[Math.floor(Math.random()*comments.length)]}
</div>

<div style="margin-top:14px">
⭐ 难度：${recipeDifficulty}
</div>

<div style="margin-top:8px">
⏱️ 时间：${recipeTime}
</div>
`;

document.getElementById("recommend").innerHTML = `
<div style="line-height:2">
${pairings[Math.floor(Math.random()*pairings.length)]}<br>
🥗 推荐搭配清爽蔬菜沙拉<br>
🍮 推荐饭后甜点提升幸福感
</div>
`;

const totalWeightValue = selectedFoods.reduce((sum,v)=>sum+parseInt(v.weight),0);

const protein = Math.floor(totalWeightValue*0.05) + Math.floor(Math.random()*20);
const fat = Math.floor(totalWeightValue*0.03) + Math.floor(Math.random()*15);
const carbs = Math.floor(totalWeightValue*0.04) + Math.floor(Math.random()*25);
const vitamins = Math.min(100,Math.floor(totalWeightValue*0.06));


currentRecipeData = {
emoji:document.getElementById("resultEmoji").innerText,
name:document.getElementById("resultName").innerText,
method:selectedMethod,
tool:selectedTool,
ingredients:selectedFoods.map(v=>`${v.emoji} ${v.name} ${v.weight}g`).join("、"),
comment:document.getElementById("comment").innerText,
steps: steps,
difficulty: recipeDifficulty,
time: recipeTime,
recommend: document.getElementById("recommend").innerHTML,
nutrition: document.getElementById("nutrition").innerHTML
};

document.getElementById("nutrition").innerHTML = `

<div style="line-height:2">
💪 蛋白质：${protein}g<br>
🧈 脂肪：${fat}g<br>
🍚 碳水化合物：${carbs}g<br>
🥦 维生素指数：${vitamins}%<br><br>
✨ AI 分析：${nutritionTips[Math.floor(Math.random()*nutritionTips.length)]}
</div>
`;

}

function closePage(){
document.getElementById("resultPage").style.display = "none";
}


let currentRecipeData = null;

function saveRecipe(){

if(!currentRecipeData){
alert("暂无可保存的菜谱");
return;
}

const oldRecipes = JSON.parse(localStorage.getItem("myRecipes") || "[]");

oldRecipes.unshift(currentRecipeData);

localStorage.setItem("myRecipes", JSON.stringify(oldRecipes));

alert("菜谱已保存到个人菜谱 📖");
}

function openMyRecipes(){

document.getElementById("myRecipePage").style.display = "block";

const list = JSON.parse(localStorage.getItem("myRecipes") || "[]");

const container = document.getElementById("myRecipeList");

if(list.length===0){
container.innerHTML = "<div style='text-align:center;padding:20px'>暂无保存的菜谱</div>";
return;
}

container.innerHTML = list.map((recipe,index)=>`
<div style="background:white;padding:20px;border-radius:22px;margin-bottom:16px;box-shadow:0 5px 20px rgba(0,0,0,.05)">
<div style="font-size:28px">${recipe.emoji}</div>
<div style="font-size:24px;font-weight:800;margin-top:10px">${recipe.name}</div>

<div style="margin-top:12px;line-height:2">
🍳 烹饪方式：${recipe.method}<br>
🛠️ 工具：${recipe.tool}<br>
🥬 食材：${recipe.ingredients}
</div>

<div style="display:flex;gap:10px;margin-top:12px">
<button onclick="viewRecipe(${index})"
style="border:none;background:#79ca7d;color:white;padding:10px 18px;border-radius:14px;cursor:pointer">
查看详情
</button>

<button onclick="deleteRecipe(${index})"
style="border:none;background:#ff7ea8;color:white;padding:10px 18px;border-radius:14px;cursor:pointer">
删除
</button>
</div>
</div>
`).join("");
}



function viewRecipe(index){

const list = JSON.parse(localStorage.getItem("myRecipes") || "[]");

const recipe = list[index];

if(!recipe){
alert("菜谱数据不存在");
return;
}

document.getElementById("savedRecipeDetailPage").style.display = "block";

document.getElementById("savedEmoji").innerText = recipe.emoji || "🍜";

document.getElementById("savedName").innerText = recipe.name || "AI 美味料理";

document.getElementById("savedTags").innerHTML = `
<div class="tag">${recipe.method || "未知方式"}</div>
<div class="tag">${recipe.tool || "未知工具"}</div>
<div class="tag">个人收藏</div>
`;

document.getElementById("savedIngredients").innerHTML = `
<div style="line-height:2">${recipe.ingredients || "暂无食材信息"}</div>
`;

document.getElementById("savedComment").innerHTML = `
<div style="line-height:2">${recipe.comment || "暂无 AI 描述"}</div>
`;

const recipeSteps = recipe.steps || [
"1. 准备并清洗食材。",
"2. 进行基础预热与调味。",
"3. 按照推荐方式完成烹饪。",
"4. 最后进行摆盘即可食用。"
];

document.getElementById("savedSteps").innerHTML =
recipeSteps.map(v=>`<li style="margin:10px 0;line-height:1.8">${v}</li>`).join("");

document.getElementById("savedDifficulty").innerHTML = `
<div style="line-height:2">
⭐ 制作难度：${recipe.difficulty || "⭐⭐⭐"}<br>
⏱️ 制作时间：${recipe.time || "20 分钟"}
</div>
`;

document.getElementById("savedRecommend").innerHTML =
recipe.recommend || `
<div style="line-height:2">
🥗 推荐搭配清爽蔬菜沙拉<br>
🥤 推荐搭配气泡饮品<br>
🍮 推荐搭配饭后甜点
</div>
`;

document.getElementById("savedNutrition").innerHTML =
recipe.nutrition || `
<div style="line-height:2">
💪 蛋白质：30g<br>
🧈 脂肪：15g<br>
🍚 碳水化合物：45g<br>
🥦 维生素指数：65%
</div>
`;
}

function closeSavedRecipe(){
document.getElementById("savedRecipeDetailPage").style.display = "none";
}


function deleteRecipe(index){

const confirmDelete = confirm("确定要删除这份个人食谱吗？删除后将无法恢复。");

if(!confirmDelete){
return;
}

const list = JSON.parse(localStorage.getItem("myRecipes") || "[]");

list.splice(index,1);

localStorage.setItem("myRecipes", JSON.stringify(list));

openMyRecipes();
}

function closeMyRecipes(){
document.getElementById("myRecipePage").style.display = "none";
}

</script>


<div class="result-page" id="myRecipePage">

<div class="result-card">
<div class="result-name">📖 个人菜谱库</div>

<div class="box">
<div id="myRecipeList"></div>
</div>

<button class="close-btn" onclick="closeMyRecipes()">关闭</button>

</div>
</div>


<div class="result-page" id="savedRecipeDetailPage">

<div class="result-card">

<div class="result-emoji" id="savedEmoji">🍜</div>

<div class="result-name" id="savedName"></div>

<div class="tags" id="savedTags"></div>

<div class="box">
<h3>🥘 食材</h3>
<div id="savedIngredients"></div>
</div>

<div class="box">
<h3>🤖 AI 美食点评</h3>
<div id="savedComment"></div>
</div>

<div class="box">
<h3>👨‍🍳 详细制作步骤</h3>
<ul id="savedSteps"></ul>
</div>

<div class="box">
<h3>⭐ 制作难度与时间</h3>
<div id="savedDifficulty"></div>
</div>

<div class="box">
<h3>🥗 推荐搭配</h3>
<div id="savedRecommend"></div>
</div>

<div class="box">
<h3>📊 营养成分分析</h3>
<div id="savedNutrition"></div>
</div>

<button class="close-btn" onclick="closeSavedRecipe()">返回个人菜谱</button>

</div>
</div>

</body>
</html>
